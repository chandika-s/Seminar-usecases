alertmanager:
  config:
    global:
      resolve_timeout: 5m
      smtp_from: erchandika@gmail.com
      smtp_hello: localhost
      smtp_smarthost: smtp.gmail.com:587
      smtp_auth_username: erchandika@gmail.com
      smtp_auth_password: "ywny uuyc duwz gbfo"
      smtp_require_tls: true

    route:
      receiver: "null"
      group_by: ["namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        # Alerts disabled: all go to default receiver "null" (no notifications)
        # Uncomment below to re-enable:
        # - receiver: "n8n"
        #   matchers: [ - severity="critical" ]
        #   continue: true
        # - receiver: "email"
        #   matchers: [ - severity="critical" ]
        #   continue: false
        - receiver: "agent-webhook"
          matchers:
            - severity="critical"
          continue: true

        # Send warning alerts (e.g. DemoAppNotReady) to agent-webhook
        - receiver: "agent-webhook"
          matchers:
            - severity="warning"
          continue: true

    inhibit_rules:
      - source_matchers: [severity="critical"]
        target_matchers: [severity=~"warning|info"]
        equal: ["namespace", "alertname"]
      - source_matchers: [severity="warning"]
        target_matchers: [severity="info"]
        equal: ["namespace", "alertname"]
      - source_matchers: [alertname="InfoInhibitor"]
        target_matchers: [severity="info"]
        equal: ["namespace"]
      - target_matchers: [alertname="InfoInhibitor"]

    receivers:
      - name: "null"

      - name: "email"
        email_configs:
          - to: cr.crazylearning@gmail.com
            from: erchandika@gmail.com
            hello: localhost
            smarthost: smtp.gmail.com:587
            auth_username: erchandika@gmail.com
            auth_password: "ywny uuyc duwz gbfo"
            send_resolved: true
            headers:
              Subject: '{{ template "email.default.subject" . }}'

      - name: "n8n"
        webhook_configs:
          - url: "http://n8n.n8n.svc.cluster.local:5678/webhook/alertmanager"
            send_resolved: true
      
      - name: "agent-webhook"
        webhook_configs:
          - url: "http://host.docker.internal:8080/webhook"
            send_resolved: true

    templates:
      - /etc/alertmanager/config/*.tmpl

