# Pod that exits immediately so it goes CrashLoopBackOff.
# Deploy: kubectl apply -f simulate_crashloop/crash-pod.yaml
# Delete after test: kubectl delete -f simulate_crashloop/crash-pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: crashloop-demo
  namespace: default
  labels:
    app: crashloop-demo
spec:
  restartPolicy: Always
  containers:
    - name: crash
      image: busybox:latest
      command: ["sh", "-c", "exit 1"]
