# ServiceAccount for the bridge pods. For EKS with IRSA (IAM Roles for Service Accounts),
# annotate this ServiceAccount with the IAM role that has bedrock-agentcore:InvokeAgentRuntime:
#
#   eksctl create iamserviceaccount \
#     --name alertmanager-agentcore-bridge \
#     --namespace alertmanager-agentcore-bridge \
#     --cluster <cluster-name> \
#     --attach-policy-arn arn:aws:iam::ACCOUNT:policy/BedrockAgentCoreInvokePolicy \
#     --approve
#
# Or annotate manually:
#   kubectl annotate serviceaccount alertmanager-agentcore-bridge \
#     -n alertmanager-agentcore-bridge \
#     eks.amazonaws.com/role-arn=arn:aws:iam::ACCOUNT:role/alertmanager-agentcore-bridge-role
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager-agentcore-bridge
  namespace: alertmanager-agentcore-bridge
  labels:
    app.kubernetes.io/name: alertmanager-agentcore-bridge
