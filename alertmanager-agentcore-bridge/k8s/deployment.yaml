apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-agentcore-bridge
  namespace: alertmanager-agentcore-bridge
  labels:
    app.kubernetes.io/name: alertmanager-agentcore-bridge
    app.kubernetes.io/component: webhook-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager-agentcore-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager-agentcore-bridge
        app.kubernetes.io/component: webhook-bridge
    spec:
      serviceAccountName: alertmanager-agentcore-bridge
      containers:
        - name: bridge
          # Replace with your image (e.g. from ECR after building and pushing)
          image: alertmanager-agentcore-bridge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: alertmanager-agentcore-bridge-config
            - secretRef:
                name: alertmanager-agentcore-bridge-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      restartPolicy: Always
