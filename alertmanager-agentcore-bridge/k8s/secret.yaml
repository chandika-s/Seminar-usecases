# Create this secret with your actual values. Do not commit real secrets.
# Example (replace placeholders):
#   kubectl create secret generic alertmanager-agentcore-bridge-secret \
#     --namespace alertmanager-agentcore-bridge \
#     --from-literal=AGENT_RUNTIME_ARN='arn:aws:bedrock-agentcore:us-east-1:123456789012:agent-runtime/xxx' \
#     --from-literal=WEBHOOK_SECRET='optional-shared-secret' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# If you omit WEBHOOK_SECRET, the bridge will not validate webhook secrets.
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-agentcore-bridge-secret
  namespace: alertmanager-agentcore-bridge
  labels:
    app.kubernetes.io/name: alertmanager-agentcore-bridge
type: Opaque
stringData:
  AGENT_RUNTIME_ARN: "REPLACE_WITH_YOUR_AGENT_RUNTIME_ARN"
  # WEBHOOK_SECRET is optional; uncomment and set to require X-Webhook-Secret or Bearer token
  # WEBHOOK_SECRET: "your-webhook-secret"
